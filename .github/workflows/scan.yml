name: Stock Daily Scanner

on:
  schedule:
    - cron: "0 11 * * *" # 한국시간 오후 8시 (데이터 집계 안정성 확보)
  workflow_dispatch: # 수동 실행 버튼 활성화

# Node.js 20 데프리케이션 경고 해결 및 최신 환경 사용
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pykrx 라이브러리 버전 갈등을 방지하기 위해 강제 업데이트(-U) 설치
          pip install pandas numpy pymongo finance-datareader
          pip install -U pykrx 

      - name: Run scanner
        run: python scanner/main.py
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}