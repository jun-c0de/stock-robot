name: Stock Daily Scanner

on:
  schedule:
    - cron: "0 11 * * *" # 한국시간 오후 8시 (데이터 집계 안정성 확보)
  workflow_dispatch: # 언제든 수동 실행 가능

# Node.js 경고 해결을 위한 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pykrx가 의존하는 lxml 등 컴파일 라이브러리 오류 방지를 위해 순서 조정
          pip install pandas numpy
          pip install pymongo finance-datareader pykrx

      - name: Run scanner
        run: python scanner/main.py
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
