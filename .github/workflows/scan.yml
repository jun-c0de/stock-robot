name: Stock Daily Scanner

on:
  schedule:
    - cron: "30 9 * * *" # 한국시간 오후 6시 30분
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy
          pip install pymongo finance-datareader pandas pykrx

      - name: Run scanner
        run: python scanner/main.py
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
